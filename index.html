<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Segurança do Trabalho</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#2563eb;--ps:#dbeafe;--bg:#f1f5f9;--card:#fff;
  --t:#1e293b;--tl:#64748b;--br:#e2e8f0;
  --red:#ef4444;--amber:#f59e0b;--green:#10b981;--teal:#06b6d4;
  --r:10px;--sh:0 1px 3px rgba(0,0,0,.1)
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);line-height:1.5}

/* ── Header ── */
.hdr{background:#fff;border-bottom:1px solid var(--br);padding:.75rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.hdr-title{font-size:1.1rem;font-weight:700;color:var(--p)}
.hdr-sub{font-size:.72rem;color:var(--tl)}
.hdr-r{display:flex;align-items:center;gap:1rem}
.sync{display:flex;align-items:center;gap:5px;font-size:.75rem;padding:3px 10px;background:var(--bg);border-radius:20px;border:1px solid var(--br)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
.clock{text-align:right;font-size:.85rem;font-weight:600}
.clock-d{font-size:.7rem;color:var(--tl)}

/* ── Nav ── */
.nav{background:#fff;border-bottom:1px solid var(--br);display:flex;padding:0 1.5rem;overflow-x:auto}
.nav-btn{padding:.85rem .75rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--tl);font-weight:500;cursor:pointer;white-space:nowrap;font-size:.88rem;transition:.2s;position:relative}
.nav-btn:hover{color:var(--p)}
.nav-btn.active{color:var(--p);border-bottom-color:var(--p)}
.badge-cnt{background:var(--red);color:#fff;border-radius:10px;font-size:.65rem;padding:1px 6px;margin-left:4px;font-weight:700;vertical-align:middle}

/* ── Layout ── */
.wrap{max-width:1200px;margin:0 auto;padding:1.5rem}
.pane{display:none}.pane.active{display:block}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi{background:#fff;border-radius:var(--r);border:1px solid var(--br);padding:1.25rem 1.5rem;border-left:4px solid var(--br);box-shadow:var(--sh)}
.kpi.blue{border-left-color:var(--p)}.kpi.red{border-left-color:var(--red)}
.kpi.amber{border-left-color:var(--amber)}.kpi.green{border-left-color:var(--green)}.kpi.teal{border-left-color:var(--teal)}
.kpi-val{font-size:1.75rem;font-weight:700;margin:.2rem 0}
.kpi-lbl{font-size:.78rem;color:var(--tl);font-weight:500}
.kpi-sub{font-size:.7rem;color:var(--tl)}

/* ── Cards genéricos ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--br);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--sh)}
.card-title{font-size:.92rem;font-weight:600;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--br)}

/* ── Grid 2 colunas ── */
.g2{display:grid;grid-template-columns:3fr 2fr;gap:1rem;margin-bottom:1rem}

/* ── Sub-tabs (NCs) ── */
.sub-tabs{display:flex;gap:.4rem;margin-bottom:1.25rem;background:#fff;padding:.45rem;border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh)}
.sub-tab{flex:1;padding:.55rem;border:none;background:none;border-radius:6px;cursor:pointer;font-weight:500;font-size:.84rem;color:var(--tl);transition:.2s}
.sub-tab:hover{background:var(--bg)}
.sub-tab.active{background:var(--p);color:#fff}
.sub-tab .cnt{font-size:.7rem;opacity:.75;margin-left:4px}

/* ── NC itens ── */
.nc-item{background:#fff;border-radius:8px;border:1px solid var(--br);border-left:4px solid var(--br);padding:1rem 1.25rem;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh);transition:box-shadow .2s}
.nc-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.nc-item.urgente{border-left-color:var(--red)}.nc-item.atencao{border-left-color:var(--amber)}
.nc-item.recente{border-left-color:var(--p)}.nc-item.resolved{border-left-color:var(--green);opacity:.85}
.nc-desc{font-size:.9rem;font-weight:600;margin-bottom:.2rem}
.nc-meta{font-size:.74rem;color:var(--tl);line-height:1.6}
.nc-days{text-align:center;margin-right:.75rem;flex-shrink:0}
.nc-days-n{font-size:1.35rem;font-weight:700}
.nc-days-l{font-size:.6rem;color:var(--tl);text-transform:uppercase}

/* ── Badges ── */
.badge{padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:600;display:inline-block}
.badge.r{background:#fee2e2;color:#b91c1c}
.badge.a{background:#fef3c7;color:#92400e}
.badge.g{background:#d1fae5;color:#065f46}
.badge.b{background:var(--ps);color:#1e40af}

/* ── Checklists ── */
.equip-group{background:#fff;border-radius:var(--r);border:1px solid var(--br);margin-bottom:1rem;overflow:hidden;box-shadow:var(--sh)}
.equip-hdr{padding:.85rem 1.1rem;background:var(--bg);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--br)}
.equip-name{font-weight:600;font-size:.9rem}
.equip-body{padding:.5rem .75rem}
.cl-card{border-radius:7px;border:1px solid var(--br);padding:.8rem 1rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.85rem}
.cl-card.com-nc{border-left:3px solid var(--red)}.cl-card.sem-nc{border-left:3px solid var(--green)}
.cl-av{width:36px;height:36px;border-radius:50%;background:var(--ps);color:var(--p);font-weight:700;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-info{flex:1;min-width:0}
.cl-name{font-size:.88rem;font-weight:600}
.cl-detail{font-size:.73rem;color:var(--tl)}
.cl-comment{font-size:.72rem;color:var(--amber);font-style:italic;margin-top:2px}
.cl-ncs{flex-shrink:0;text-align:right}
.cl-nc-list{font-size:.7rem;color:var(--tl);margin-top:.25rem;max-width:180px;text-align:right;line-height:1.5}

/* ── DSS ── */
.dss-card{background:#fff;border-radius:8px;border:1px solid var(--br);padding:1rem 1.25rem;margin-bottom:.6rem;box-shadow:var(--sh)}
.dss-date{font-size:.73rem;color:var(--tl);margin-bottom:.15rem}
.dss-tema{font-size:.92rem;font-weight:600;margin-bottom:.2rem}
.dss-meta{font-size:.76rem;color:var(--tl)}

/* ── Filter bar ── */
.fbar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.fbtn{padding:5px 13px;border-radius:20px;border:1px solid var(--br);background:#fff;cursor:pointer;font-size:.79rem;font-weight:500;color:var(--tl);transition:.2s}
.fbtn:hover{border-color:var(--p);color:var(--p)}
.fbtn.active{background:var(--p);color:#fff;border-color:var(--p)}

/* ── Buttons ── */
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--br);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:.2s}
.btn-p{background:var(--p);color:#fff;border:none}.btn-p:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-o{background:#fff;color:var(--t)}

/* ── Modal/Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.65);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal{background:#fff;padding:1.75rem;border-radius:12px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1rem;font-weight:600;margin-bottom:1.25rem}
.form-g{margin-bottom:.9rem}
.form-g label{display:block;font-size:.79rem;font-weight:600;margin-bottom:4px;color:var(--tl)}
.form-ctrl{width:100%;padding:9px 10px;border:1px solid var(--br);border-radius:6px;font-family:inherit;font-size:.875rem}
.form-ctrl:focus{outline:none;border-color:var(--p)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.9rem 1.25rem;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:2000;border-left:4px solid var(--p);font-size:.875rem;animation:su .3s ease}
.toast.err{border-left-color:var(--red)}
@keyframes su{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Empty state ── */
.empty{text-align:center;padding:3rem;color:var(--tl)}
.empty-icon{font-size:2.5rem;margin-bottom:.6rem}

/* ── Chart ── */
.chart-wrap{position:relative;height:210px}

/* ── Responsive ── */
@media(max-width:768px){
  .g2{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .hdr{flex-direction:column;gap:.5rem;text-align:center}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div>
    <div class="hdr-title">🛡️ Segurança do Trabalho</div>
    <div class="hdr-sub">Monitoramento em Tempo Real</div>
  </div>
  <div class="hdr-r">
    <div class="sync"><div class="sync-dot" id="sdot"></div><span id="stxt">Conectando...</span></div>
    <div><div class="clock" id="hora">00:00</div><div class="clock-d" id="dstr">...</div></div>
  </div>
</header>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="aba('g',this)">Dashboard</button>
  <button class="nav-btn" onclick="aba('cl',this)">Checklists</button>
  <button class="nav-btn" onclick="aba('nc',this)">Não Conformidades <span id="cnt-nc" class="badge-cnt" style="display:none">0</span></button>
  <button class="nav-btn" onclick="aba('d',this)">DSS</button>
</nav>

<main class="wrap">

  <!-- ── DASHBOARD ── -->
  <div id="tg" class="pane active">
    <div class="kpis" id="kpis-dash"></div>
    <div class="g2">
      <div class="card">
        <div class="card-title">NCs por Equipamento</div>
        <div id="eq-lista"></div>
      </div>
      <div class="card">
        <div class="card-title">Status das NCs</div>
        <div class="chart-wrap"><canvas id="ch-status"></canvas></div>
        <div id="ch-leg" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:.75rem;font-size:.74rem"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Inspeções de Hoje</div>
      <div id="dash-hoje"></div>
    </div>
  </div>

  <!-- ── CHECKLISTS ── -->
  <div id="tcl" class="pane">
    <div class="fbar" id="cl-fbar"></div>
    <div class="kpis" id="cl-kpis"></div>
    <div id="cl-lista"></div>
  </div>

  <!-- ── NÃO CONFORMIDADES ── -->
  <div id="tnc" class="pane">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="ncTab('nova',this)">Novas <span class="cnt" id="cnt-nova">0</span></button>
      <button class="sub-tab" onclick="ncTab('pend',this)">Pendentes <span class="cnt" id="cnt-pend">0</span></button>
      <button class="sub-tab" onclick="ncTab('resv',this)">Resolvidas <span class="cnt" id="cnt-resv">0</span></button>
    </div>
    <div id="nc-lista"></div>
  </div>

  <!-- ── DSS ── -->
  <div id="td" class="pane">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <h3 style="font-size:1rem;font-weight:600">Diálogos de Segurança</h3>
      <button class="btn btn-p" onclick="abrirDSS()">+ Novo DSS</button>
    </div>
    <div class="kpis" id="kpis-dss"></div>
    <div id="dss-lista"></div>
  </div>

</main>

<!-- MODAL: Tratativa NC -->
<div class="overlay" id="mnc" onclick="if(event.target===this)fm('mnc')">
  <div class="modal">
    <div class="modal-title" id="mtit">Tratativa da NC</div>
    <div class="form-g">
      <label>Status</label>
      <select id="mst" class="form-ctrl">
        <option value="nao-iniciada">Não Iniciada</option>
        <option value="em-andamento">Em Andamento</option>
        <option value="resolvida">Resolvida</option>
      </select>
    </div>
    <div class="form-g"><label>Responsável</label><input type="text" id="mre" class="form-ctrl" placeholder="Nome do responsável"></div>
    <div class="form-g"><label>Prazo</label><input type="date" id="mpr" class="form-ctrl"></div>
    <div class="form-g"><label>Ação Tomada</label><textarea id="mac" class="form-ctrl" rows="3" placeholder="Descreva a ação..."></textarea></div>
    <div class="modal-foot">
      <button class="btn btn-o" onclick="fm('mnc')">Cancelar</button>
      <button class="btn btn-p" id="bsnc" onclick="saveTrat()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: DSS -->
<div class="overlay" id="mdss" onclick="if(event.target===this)fm('mdss')">
  <div class="modal">
    <div class="modal-title">Novo Registro de DSS</div>
    <div class="form-g"><label>Data</label><input type="date" id="dd" class="form-ctrl"></div>
    <div class="form-g"><label>Tema</label><input type="text" id="dt" class="form-ctrl" placeholder="Tema do diálogo"></div>
    <div class="form-g"><label>Setor</label><input type="text" id="dse" class="form-ctrl" placeholder="Setor"></div>
    <div class="form-g"><label>Responsável</label><input type="text" id="dr" class="form-ctrl" placeholder="Quem conduziu"></div>
    <div class="form-g"><label>Nº Participantes</label><input type="number" id="dp" class="form-ctrl" placeholder="0"></div>
    <div class="form-g"><label>Assuntos Abordados</label><textarea id="da" class="form-ctrl" rows="3" placeholder="Tópicos discutidos..."></textarea></div>
    <div class="modal-foot">
      <button class="btn btn-o" onclick="fm('mdss')">Cancelar</button>
      <button class="btn btn-p" id="bsdss" onclick="saveDSS()">Registrar</button>
    </div>
  </div>
</div>

<script>
// ══ CONFIGURAÇÃO ══════════════════════════════════════════════
const FC = {
  apiKey:            "COLE_SUA_API_KEY_AQUI",
  authDomain:        "seguranca-trabalho-80ff4.firebaseapp.com",
  databaseURL:       "https://seguranca-trabalho-80ff4-default-rtdb.firebaseio.com",
  projectId:         "seguranca-trabalho-80ff4",
  storageBucket:     "seguranca-trabalho-80ff4.appspot.com",
  messagingSenderId: "COLE_SEU_SENDER_ID_AQUI",
  appId:             "COLE_SEU_APP_ID_AQUI"
};
const ADMIN_KEY = "seguranca2024";
const API_URL   = "https://script.google.com/macros/s/AKfycbwuwMSWd3FIuV7CDFS13xpzZ_jNA5bxRJYGutHeYe5ufN0EqIMbz80KDwJylyYZAUQ_/exec";
// ══════════════════════════════════════════════════════════════

let db = null;
let G  = { ncsUnicas:[], equipamentos:[], totalInspecoes:0, inspecoesHoje:[], inspecoesSemana:[] };
let T  = {}, DL = [], NCA = null, isAdmin = false;
let _chStatus = null, _ncTab = 'nova', _clFiltro = 'hoje';

try { firebase.initializeApp(FC); db = firebase.database(); } catch(e) { console.warn("Firebase não configurado"); }
isAdmin = new URLSearchParams(window.location.search).get('admin') === ADMIN_KEY;

// ── Relógio ──────────────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('hora').textContent = n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dstr').textContent = n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
}
tick(); setInterval(tick, 60000);

// ── Sync badge ───────────────────────────────────────────────
function setSS(s) {
  const dot = document.getElementById('sdot'), txt = document.getElementById('stxt');
  const m = { ok:{c:'var(--green)',t:'Sincronizado'}, loading:{c:'var(--amber)',t:'Conectando'}, demo:{c:'var(--amber)',t:'Modo Demo'} };
  const e = m[s] || m.loading;
  dot.style.background = e.c; txt.textContent = e.t;
}

// ── Navegação ────────────────────────────────────────────────
function aba(id, btn) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('t' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'cl') rCL(_clFiltro);
  if (id === 'nc') rNC(_ncTab);
  if (id === 'd')  rDSS();
}

// ── Chave NC ─────────────────────────────────────────────────
function nk(nc) { return (nc.equipamento + '__' + nc.itemCurto).replace(/[^a-zA-Z0-9_]/g,'_').slice(0,120); }
function st(nc) { return (T[nk(nc)] || {}).status || 'nao-iniciada'; }

// ── Inicialização ─────────────────────────────────────────────
function iniciar() {
  if (!db) { G = demo(); rTudo(); setSS('demo'); return; }
  setSS('loading');
  db.ref('tratativas').on('value', s => {
    T = s.val() || {};
    if (G.ncsUnicas.length) rTudo();
  });
  db.ref('dss').on('value', s => {
    const r = s.val() || {};
    DL = Object.entries(r).map(([id,v]) => ({id,...v})).sort((a,b) => b.data.localeCompare(a.data));
    rDSSKpis();
    if (document.getElementById('td').classList.contains('active')) rDSS();
  });
  buscar(); setInterval(buscar, 5 * 60 * 1000);
}

async function buscar() {
  try {
    const r = await fetch(API_URL + '?_=' + Date.now());
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (d.erro) throw new Error();
    G.ncsUnicas      = d.ncsUnicas      || [];
    G.equipamentos   = d.equipamentos   || [];
    G.totalInspecoes = d.totalInspecoes || 0;
    G.inspecoesHoje  = d.inspecoesHoje  || [];
    G.inspecoesSemana= d.inspecoesSemana|| [];
    rTudo(); setSS('ok');
    if (document.getElementById('tcl').classList.contains('active')) rCL(_clFiltro);
    if (document.getElementById('tnc').classList.contains('active')) rNC(_ncTab);
  } catch(e) {
    setSS(G.ncsUnicas.length ? 'ok' : 'demo');
    if (!G.ncsUnicas.length) { G = demo(); rTudo(); }
  }
}

// ── Render principal ─────────────────────────────────────────
function rTudo() {
  const ncs  = G.ncsUnicas || [];
  const ab   = ncs.filter(n => st(n) !== 'resolvida');
  const nova = ncs.filter(n => st(n) === 'nao-iniciada');
  const pend = ncs.filter(n => st(n) === 'em-andamento');
  const resv = ncs.filter(n => st(n) === 'resolvida');

  // Badge nav NC
  const cntEl = document.getElementById('cnt-nc');
  cntEl.textContent = ab.length;
  cntEl.style.display = ab.length ? '' : 'none';

  // Contadores sub-tabs NC
  document.getElementById('cnt-nova').textContent = nova.length;
  document.getElementById('cnt-pend').textContent = pend.length;
  document.getElementById('cnt-resv').textContent = resv.length;

  // KPIs Dashboard
  document.getElementById('kpis-dash').innerHTML = [
    {c:'blue',  l:'Inspeções',     v:G.totalInspecoes, s:(G.equipamentos||[]).length+' equipamentos'},
    {c:'red',   l:'NCs Abertas',   v:ab.length,        s:nova.length+' sem tratativa'},
    {c:'amber', l:'Em Andamento',  v:pend.length,      s:'aguardando resolução'},
    {c:'green', l:'Resolvidas',    v:resv.length,      s:'período total'},
  ].map(k => `<div class="kpi ${k.c}">
    <div class="kpi-lbl">${k.l}</div>
    <div class="kpi-val">${k.v}</div>
    <div class="kpi-sub">${k.s}</div>
  </div>`).join('');

  rChart(ncs);
  rEq();
  rDashHoje();
  rDSSKpis();

  // Atualiza abas abertas
  if (document.getElementById('tnc').classList.contains('active')) rNC(_ncTab);
  if (document.getElementById('tcl').classList.contains('active')) rCL(_clFiltro);
}

// ── Chart donut ──────────────────────────────────────────────
function rChart(ncs) {
  const ni = ncs.filter(n => st(n) === 'nao-iniciada').length;
  const ea = ncs.filter(n => st(n) === 'em-andamento').length;
  const rv = ncs.filter(n => st(n) === 'resolvida').length;
  if (_chStatus) _chStatus.destroy();
  const el = document.getElementById('ch-status');
  if (!el) return;
  _chStatus = new Chart(el, {
    type: 'doughnut',
    data: { labels:['Não iniciada','Em andamento','Resolvida'], datasets:[{data:[ni,ea,rv],backgroundColor:['#ef4444','#f59e0b','#22c55e'],borderWidth:0}] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ display:false } } }
  });
  document.getElementById('ch-leg').innerHTML = [
    {c:'#ef4444', l:'Não iniciada', n:ni},
    {c:'#f59e0b', l:'Em andamento', n:ea},
    {c:'#22c55e', l:'Resolvida',    n:rv},
  ].map(x => `<span style="display:flex;align-items:center;gap:5px">
    <span style="width:9px;height:9px;border-radius:50%;background:${x.c};flex-shrink:0"></span>
    ${x.l} <strong>(${x.n})</strong>
  </span>`).join('');
}

// ── Barras por equipamento ────────────────────────────────────
function rEq() {
  const eq = (G.equipamentos || []).filter(e => e.ncsUnicas > 0).sort((a,b) => b.ncsUnicas - a.ncsUnicas).slice(0,8);
  if (!eq.length) { document.getElementById('eq-lista').innerHTML = '<p style="font-size:.8rem;color:var(--tl)">Nenhuma NC por equipamento</p>'; return; }
  const mx = Math.max(...eq.map(e => e.ncsUnicas), 1);
  document.getElementById('eq-lista').innerHTML = eq.map(e => {
    const p = Math.round(e.ncsUnicas / mx * 100);
    const c = e.ncsUnicas <= 2 ? 'var(--amber)' : 'var(--red)';
    const nome = e.nome.replace('Inspeção Setorial — ','').replace('Inspeção — ','');
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px">
        <span>${nome}</span><span style="font-weight:700;color:${c}">${e.ncsUnicas}</span>
      </div>
      <div style="height:5px;background:var(--bg);border-radius:3px;overflow:hidden">
        <div style="width:${p}%;background:${c};height:100%"></div>
      </div>
    </div>`;
  }).join('');
}

// ── Resumo hoje (Dashboard) ────────────────────────────────────
function rDashHoje() {
  const lista = G.inspecoesHoje || [];
  const el = document.getElementById('dash-hoje');
  if (!lista.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Nenhuma inspeção registrada hoje</p></div>';
    return;
  }
  const comNC = lista.filter(i => i.ncs > 0).length;
  el.innerHTML = `<div style="font-size:.78rem;color:var(--tl);margin-bottom:.75rem">${lista.length} inspeção${lista.length>1?'ões':''} hoje · ${comNC} com NC apontada</div>` +
    lista.slice(0, 6).map(i => {
      const ini = i.responsavel.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
      return `<div class="cl-card ${i.ncs > 0 ? 'com-nc' : 'sem-nc'}">
        <div class="cl-av">${ini}</div>
        <div class="cl-info">
          <div class="cl-name">${i.responsavel}</div>
          <div class="cl-detail">${i.equipamento} · ${i.setor} · ${i.hora}</div>
          ${i.comentario ? `<div class="cl-comment">"${i.comentario.slice(0,80)}"</div>` : ''}
        </div>
        ${i.ncs > 0 ? `<span class="badge r">${i.ncs} NC${i.ncs>1?'s':''}</span>` : `<span class="badge g">OK</span>`}
      </div>`;
    }).join('') +
    (lista.length > 6 ? `<p style="font-size:.74rem;color:var(--tl);text-align:center;margin-top:.5rem">+${lista.length-6} mais — veja a aba Checklists</p>` : '');
}

// ── Checklists ───────────────────────────────────────────────
function rCL(filtro) {
  _clFiltro = filtro;
  let lista = [];
  if (filtro === 'hoje')    lista = G.inspecoesHoje || [];
  else if (filtro === 'semana') lista = G.inspecoesSemana || [];
  else lista = (G.inspecoesSemana || []).filter(i => i.equipamento === filtro);

  // Monta filter bar
  const equips = [...new Set([...(G.inspecoesHoje||[]),...(G.inspecoesSemana||[])].map(i => i.equipamento))];
  const fbar = document.getElementById('cl-fbar');
  fbar.innerHTML = '';
  [{pt:'Hoje',v:'hoje'},{pt:'7 dias',v:'semana'}, ...equips.map(e => ({pt:e,v:e}))].forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'fbtn' + (b.v === filtro ? ' active' : '');
    btn.textContent = b.pt;
    btn.onclick = () => rCL(b.v);
    fbar.appendChild(btn);
  });

  // KPIs
  const comNC = lista.filter(i => i.ncs > 0).length;
  const semNC = lista.filter(i => i.ncs === 0).length;
  document.getElementById('cl-kpis').innerHTML = [
    {c:'blue',  l:'Inspeções',    v:lista.length, s:'no período'},
    {c:'green', l:'Conformes',    v:semNC,        s:'sem NC'},
    {c:'red',   l:'Com NC',       v:comNC,        s:'registraram problema'},
    {c:'teal',  l:'Equipamentos', v:new Set(lista.map(i=>i.equipamento)).size, s:'inspecionados'},
  ].map(k => `<div class="kpi ${k.c}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');

  if (!lista.length) {
    document.getElementById('cl-lista').innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Nenhuma inspeção no período</p></div>';
    return;
  }

  // Agrupa por equipamento
  const porEquip = {};
  lista.forEach(i => { if(!porEquip[i.equipamento]) porEquip[i.equipamento]=[]; porEquip[i.equipamento].push(i); });

  document.getElementById('cl-lista').innerHTML = Object.entries(porEquip)
    .sort((a,b) => { const na=a[1].some(i=>i.ncs>0), nb=b[1].some(i=>i.ncs>0); return nb-na; })
    .map(([equip, insps]) => {
      const totalNC = insps.reduce((s,i) => s+i.ncs, 0);
      const badgeHTML = totalNC > 0
        ? `<span class="badge r">${totalNC} NC${totalNC>1?'s':''}</span>`
        : `<span class="badge g">Conforme</span>`;

      const cards = insps
        .sort((a,b) => b.data.localeCompare(a.data) || b.hora.localeCompare(a.hora))
        .map(i => {
          const ini = i.responsavel.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
          // Correlaciona NCs do mesmo equipamento reportadas por essa pessoa
          const ncsRelac = (G.ncsUnicas || []).filter(nc =>
            nc.equipamento === equip &&
            nc.responsaveis && nc.responsaveis.some(r => r.toLowerCase().includes(i.responsavel.split(' ')[0].toLowerCase()))
          );
          const ncListHTML = ncsRelac.length
            ? `<div class="cl-nc-list">${ncsRelac.slice(0,3).map(nc => `• ${nc.itemCurto.slice(0,45)}`).join('<br>')}</div>`
            : '';
          return `<div class="cl-card ${i.ncs > 0 ? 'com-nc' : 'sem-nc'}">
            <div class="cl-av">${ini}</div>
            <div class="cl-info">
              <div class="cl-name">${i.responsavel}</div>
              <div class="cl-detail">${i.setor}${i.turno && i.turno !== '—' ? ' · ' + i.turno : ''} · ${i.data} ${i.hora}</div>
              ${i.comentario ? `<div class="cl-comment">"${i.comentario.slice(0,80)}"</div>` : ''}
            </div>
            <div class="cl-ncs">
              ${i.ncs > 0 ? `<span class="badge r">${i.ncs} NC${i.ncs>1?'s':''}</span>` : `<span class="badge g">OK</span>`}
              ${ncListHTML}
            </div>
          </div>`;
        }).join('');

      return `<div class="equip-group">
        <div class="equip-hdr">
          <div>
            <span class="equip-name">${equip}</span>
            <span style="font-size:.74rem;color:var(--tl);margin-left:.5rem">${insps.length} inspeção${insps.length>1?'ões':''}</span>
          </div>
          ${badgeHTML}
        </div>
        <div class="equip-body">${cards}</div>
      </div>`;
    }).join('');
}

// ── Não Conformidades ────────────────────────────────────────
function ncTab(tab, btn) {
  _ncTab = tab;
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rNC(tab);
}

function rNC(tab) {
  const ncs = G.ncsUnicas || [];
  let lista;
  if (tab === 'nova')     lista = ncs.filter(n => st(n) === 'nao-iniciada');
  else if (tab === 'pend') lista = ncs.filter(n => st(n) === 'em-andamento');
  else                     lista = ncs.filter(n => st(n) === 'resolvida');

  const msgs = { nova:'Nenhuma NC nova sem tratativa', pend:'Nenhuma NC em andamento', resv:'Nenhuma NC resolvida' };
  if (!lista.length) {
    document.getElementById('nc-lista').innerHTML = `<div class="empty"><div class="empty-icon">${tab==='resv'?'✅':'📋'}</div><p>${msgs[tab]||''}</p></div>`;
    return;
  }

  lista.sort((a,b) => b.diasEmAberto - a.diasEmAberto);
  document.getElementById('nc-lista').innerHTML = lista.map(nc => {
    const tr = T[nk(nc)] || {};
    const cls = tab === 'resv' ? 'resolved' : nc.urgencia;
    const bCls = nc.urgencia === 'urgente' ? 'r' : nc.urgencia === 'atencao' ? 'a' : 'b';
    const nj = JSON.stringify(JSON.stringify(nc));
    return `<div class="nc-item ${cls}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:.2rem;flex-wrap:wrap">
          <span class="badge ${bCls}">${nc.urgencia.toUpperCase()}</span>
          <span style="font-size:.72rem;color:var(--tl)">${nc.equipamento} · ${nc.setor||'—'}</span>
        </div>
        <div class="nc-desc">${nc.itemCurto}</div>
        <div class="nc-meta">
          ${nc.ocorrencias} ocorrência${nc.ocorrencias>1?'s':''} · desde ${nc.primeiraNota}
          ${nc.responsaveis&&nc.responsaveis.length ? ' · Reportado por: '+nc.responsaveis.join(', ') : ''}
          ${tr.responsavel ? ' · <strong>Resp: '+tr.responsavel+'</strong>' : ''}
          ${tr.prazo ? ' · Prazo: '+tr.prazo : ''}
        </div>
        ${tr.acao ? `<div style="font-size:.72rem;color:var(--tl);margin-top:.25rem;font-style:italic">${tr.acao.slice(0,100)}${tr.acao.length>100?'…':''}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:.6rem;flex-shrink:0;margin-left:.75rem">
        <div class="nc-days">
          <div class="nc-days-n">${nc.diasEmAberto}</div>
          <div class="nc-days-l">dias</div>
        </div>
        <button class="btn btn-p btn-sm" onclick='om(${nj})'>${tab==='resv'?'Ver':'Tratar'}</button>
      </div>
    </div>`;
  }).join('');
}

// ── Modal NC ─────────────────────────────────────────────────
function om(nj) {
  NCA = JSON.parse(nj);
  const tr = T[nk(NCA)] || {};
  document.getElementById('mtit').textContent = NCA.itemCurto.slice(0,65);
  document.getElementById('mst').value = tr.status || 'nao-iniciada';
  document.getElementById('mre').value = tr.responsavel || '';
  document.getElementById('mpr').value = tr.prazo || '';
  document.getElementById('mac').value = tr.acao || '';
  document.getElementById('mnc').style.display = 'flex';
}

async function saveTrat() {
  if (!NCA) return;
  const btn = document.getElementById('bsnc');
  btn.disabled = true;
  const k = nk(NCA), tr = {
    status:      document.getElementById('mst').value,
    responsavel: document.getElementById('mre').value.trim(),
    prazo:       document.getElementById('mpr').value,
    acao:        document.getElementById('mac').value.trim(),
    updatedAt:   new Date().toISOString(),
    equipamento: NCA.equipamento,
    itemCurto:   NCA.itemCurto,
    setor:       NCA.setor || ''
  };
  try {
    if (db) { await db.ref('tratativas/' + k).set(tr); toast('Salvo com sucesso'); }
    else    { T[k] = tr; rTudo(); toast('Salvo localmente'); }
  } catch(e) { T[k] = tr; rTudo(); toast('Erro de sync — salvo localmente','err'); }
  fm('mnc');
  btn.disabled = false;
}

// ── DSS ──────────────────────────────────────────────────────
function rDSSKpis() {
  const n = new Date();
  const mes = DL.filter(d => { const m = new Date(d.data); return m.getMonth()===n.getMonth() && m.getFullYear()===n.getFullYear(); }).length;
  const par = DL.reduce((a,d) => a + (parseInt(d.participantes)||0), 0);
  document.getElementById('kpis-dss').innerHTML = [
    {c:'teal',  l:'Total DSS',     v:DL.length, s:'desde o início'},
    {c:'blue',  l:'Este mês',      v:mes,        s:'mês atual'},
    {c:'green', l:'Participantes', v:par,        s:'acumulado'},
  ].map(k => `<div class="kpi ${k.c}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
}

function rDSS() {
  rDSSKpis();
  if (!DL.length) {
    document.getElementById('dss-lista').innerHTML = '<div class="empty"><div class="empty-icon">💬</div><p>Nenhum DSS registrado</p></div>';
    return;
  }
  document.getElementById('dss-lista').innerHTML = DL.map(d => `
    <div class="dss-card">
      <div class="dss-date">${d.data} · ${d.setor||'—'}</div>
      <div class="dss-tema">${d.tema||'—'}</div>
      <div class="dss-meta">Responsável: <strong>${d.responsavel||'—'}</strong> · Participantes: <strong>${d.participantes||0}</strong></div>
      ${d.assuntos ? `<div style="font-size:.77rem;color:var(--tl);margin-top:.35rem;line-height:1.6">${d.assuntos.replace(/\n/g,'<br>')}</div>` : ''}
      ${isAdmin ? `<button class="btn btn-sm" style="margin-top:.5rem;font-size:.74rem;color:var(--red)" onclick="delDSS('${d.id}')">Excluir</button>` : ''}
    </div>`).join('');
}

function abrirDSS() {
  document.getElementById('dd').value = new Date().toISOString().split('T')[0];
  ['dt','dse','dr','da'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('dp').value = '';
  document.getElementById('mdss').style.display = 'flex';
}

async function saveDSS() {
  const btn = document.getElementById('bsdss'), tema = document.getElementById('dt').value.trim();
  if (!tema) { toast('Informe o tema','err'); return; }
  btn.disabled = true;
  const dss = {
    data:         document.getElementById('dd').value,
    tema,
    setor:        document.getElementById('dse').value.trim(),
    responsavel:  document.getElementById('dr').value.trim(),
    participantes:parseInt(document.getElementById('dp').value)||0,
    assuntos:     document.getElementById('da').value.trim(),
    criadoEm:     new Date().toISOString()
  };
  try {
    if (db) { await db.ref('dss').push(dss); toast('DSS registrado'); }
    else    { DL.unshift({id:Date.now().toString(),...dss}); rDSS(); toast('Salvo localmente'); }
  } catch(e) { toast('Erro ao salvar','err'); }
  fm('mdss'); btn.disabled = false;
}

async function delDSS(id) {
  if (!isAdmin) { toast('Sem permissão','err'); return; }
  if (!confirm('Excluir este DSS?')) return;
  try {
    if (db) await db.ref('dss/' + id).remove();
    DL = DL.filter(d => d.id !== id); rDSS(); toast('DSS excluído');
  } catch(e) { toast('Erro ao excluir','err'); }
}

// ── Helpers ──────────────────────────────────────────────────
function fm(id) { document.getElementById(id).style.display='none'; NCA=null; }
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast' + (type==='err'?' err':'');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
